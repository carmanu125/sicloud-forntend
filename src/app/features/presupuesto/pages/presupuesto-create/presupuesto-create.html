<div class="bg-white text-gray-900 selection:bg-gray-200">
  <!-- Progress Bar Component -->
  <app-progress-bar [isLoading$]="isSaving$"></app-progress-bar>

<section class="flex justify-center items-start py-10 bg-slate-50 min-h-screen">

  <div class="bg-white rounded-xl shadow-2xl w-full max-w-5xl border border-slate-200 overflow-hidden">

    <!-- HEADER -->
    <div class="px-6 py-4 border-b flex items-center justify-between">
      <h2 class="text-lg font-bold text-blue-600">
        Nuevo rubro presupuestal
      </h2>

      
    </div>

    <!-- BODY -->
    <div class="p-6 max-h-[80vh] overflow-y-auto">

      <form
        [formGroup]="formPresupuesto"
        (ngSubmit)="guardar()"
        class="space-y-6">

        <!-- ================== BLOQUE 1 ================== -->
        <div class="grid grid-cols-12 gap-4">

          <div class="col-span-12 md:col-span-6">
            <label class="text-sm text-gray-600">Nombre</label>
            <input type="text" formControlName="nombre"
              class="w-full border rounded-lg px-4 py-2" />
          </div>

          <div class="col-span-12 md:col-span-3">
            <label class="text-sm text-gray-600">Rubro</label>
            <input type="text" formControlName="rubro"
              class="w-full border rounded-lg px-4 py-2" />
          </div>

          <div class="col-span-12 md:col-span-3">
            <label class="text-sm text-gray-600">Fuente</label>
            <input type="text" formControlName="fuente"
              class="w-full border rounded-lg px-4 py-2" />
          </div>

        </div>

        <!-- ================== BLOQUE 2 ================== -->
        <div class="grid grid-cols-12 gap-4">

          <div class="col-span-6 md:col-span-3">
            <label class="text-sm text-gray-600">Tipo Presupuesto</label>
            <input type="text" formControlName="tipoPre"
              class="w-full border rounded-lg px-4 py-2" />
          </div>

          <div class="col-span-6 md:col-span-3">
            <label class="text-sm text-gray-600">Sector</label>
            <input type="text" formControlName="sector"
              class="w-full border rounded-lg px-4 py-2" />
          </div>

          <div class="col-span-6 md:col-span-3">
            <label class="text-sm text-gray-600">Producto</label>
            <input type="text" formControlName="producto"
              class="w-full border rounded-lg px-4 py-2" />
          </div>

          <div class="col-span-6 md:col-span-3">
            <label class="text-sm text-gray-600">Programa</label>
            <input type="text" formControlName="programa"
              class="w-full border rounded-lg px-4 py-2" />
          </div>

        </div>

        <!-- ================== BLOQUE 3 ================== -->
        <div class="grid grid-cols-12 gap-4">

          <div class="col-span-6 md:col-span-3">
            <label class="text-sm text-gray-600">Código CPC</label>
            <input type="text" formControlName="codCpc"
              class="w-full border rounded-lg px-4 py-2" />
          </div>

          <div class="col-span-6 md:col-span-3">
            <label class="text-sm text-gray-600">BPIN</label>
            <input type="text" formControlName="bpin"
              class="w-full border rounded-lg px-4 py-2" />
          </div>

          <div class="col-span-6 md:col-span-3">
            <label class="text-sm text-gray-600">Tipo</label>
            <input type="text" formControlName="tipo"
              class="w-full border rounded-lg px-4 py-2" />
          </div>

          <div class="col-span-6 md:col-span-3">
            <label class="text-sm text-gray-600">RM</label>
            <input type="text" formControlName="rm"
              class="w-full border rounded-lg px-4 py-2" />
          </div>

        </div>

        <!-- ================== BLOQUE 4 ================== -->
        <div class="grid grid-cols-12 gap-4">

          <div class="col-span-6 md:col-span-4">
            <label class="text-sm text-gray-600">Valor Inicial</label>
            <input type="number" formControlName="inicial"
              class="w-full border rounded-lg px-4 py-2 text-right font-mono" />
          </div>

          <div class="col-span-6 md:col-span-4">
            <label class="text-sm text-gray-600">Empresa ID</label>
            <input type="number" formControlName="empresaId"
              class="w-full border rounded-lg px-4 py-2" />
          </div>

        </div>

        <!-- ================== BLOQUE 5 ================== -->
        <div class="grid grid-cols-12 gap-4 pt-4 border-t">

          <div class="col-span-12 md:col-span-6">
            <label class="text-sm text-gray-600">Denominación CCPT</label>
            <input type="text" formControlName="denominacionCcpt"
              class="w-full border rounded-lg px-4 py-2" />
          </div>

          <div class="col-span-12 md:col-span-6">
            <label class="text-sm text-gray-600">Dependencia</label>
            <input type="text" formControlName="dependencia"
              class="w-full border rounded-lg px-4 py-2" />
          </div>

        </div>

      </form>

    </div>

    <!-- FOOTER -->
    <div class="px-6 py-4 border-t flex justify-end gap-3 bg-slate-50">

      <button
        type="button"
        routerLink="/presupuesto"
        class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-gray-800">
        Cancelar
      </button>

      <button
        (click)="guardar()"
        class="px-6 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700 shadow-sm">
        Guardar
      </button>

    </div>

  </div>

</section>
</div>
