<section class="max-w-7xl mx-auto">

  <!-- HEADER -->
  <div class="flex items-center justify-between mb-6">

    <div>
      <h2 class="text-2xl font-semibold text-gray-800">
        Presupuestos Gastos e Inversión
      </h2>

      <p class="text-sm text-gray-500">
        Gestión de presupuestos del sistema
      </p>
    </div>

    <button
      routerLink="/presupuesto/nuevo"
      class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm transition">
      + Nuevo Presupuesto
    </button>

  </div>

  <!-- BUSCADOR -->
  <form [formGroup]="formBusqueda" class="mb-4 flex justify-end">

    <input
      type="text"
      formControlName="buscar"
      placeholder="Buscar presupuesto..."
      class="border rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-200 focus:outline-none"
    />

  </form>

  <!-- TABLA -->
  <div class="bg-white rounded-xl shadow-sm border overflow-hidden">

    <table class="w-full text-sm">

      <thead class="bg-gray-50 border-b">
        <tr>
          <th class="text-left px-6 py-3 font-semibold text-gray-600">Nombre</th>
          <th class="text-left px-6 py-3 font-semibold text-gray-600">Rubro</th>
          <th class="text-left px-6 py-3 font-semibold text-gray-600">Sector</th>
          <th class="text-left px-6 py-3 font-semibold text-gray-600">Tipo</th>
          <th class="text-left px-6 py-3 font-semibold text-gray-600">Valor</th>
          <th class="text-right px-6 py-3 font-semibold text-gray-600">Acciones</th>
        </tr>
      </thead>

      <tbody class="divide-y">

        <tr
          *ngFor="let p of (presupuestosFiltrados$ | async)"
          class="hover:bg-gray-50 transition">

          <td class="px-6 py-4">{{ p.nombre }}</td>
          <td class="px-6 py-4">{{ p.rubro }}</td>
          <td class="px-6 py-4">{{ p.sector }}</td>
          <td class="px-6 py-4">{{ p.tipoPre }}</td>
          <td class="px-6 py-4">{{ p.inicial | currency }}</td>

          <td class="px-6 py-4 text-right space-x-2">

            <button class="text-blue-600 hover:text-blue-800 text-sm font-medium">
              Editar
            </button>

            <button
              (click)="delete(p.id!)"
              class="text-red-500 hover:text-red-700 text-sm font-medium">
              Eliminar
            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</section>
