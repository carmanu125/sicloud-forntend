<div class="bg-white text-gray-900 selection:bg-gray-200">
  <!-- Progress Bar Component -->
  <app-progress-bar [isLoading$]="isSaving$"></app-progress-bar>

<section class="max-w-xl mx-auto">

  <h2 class="text-2xl font-semibold mb-6">
    Nueva Empresa
  </h2>

  <form
    [formGroup]="formEmpresa"
    (ngSubmit)="guardar()"
    class="space-y-4">

    <div>

      <label class="block text-sm text-gray-600 mb-1">
        Nombre
      </label>

      <input
        type="text"
        formControlName="nombre"
        class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-200 focus:outline-none"/>

    </div>

    <div class="flex gap-3">

      <button
        type="submit"
        class="bg-blue-600 text-white px-4 py-2 rounded-lg">

        Guardar

      </button>

      <button
        type="button"
        routerLink="/empresas"
        class="bg-gray-200 px-4 py-2 rounded-lg">

        Cancelar

      </button>

    </div>

  </form>

</section>
</div>
